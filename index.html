<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distance Only Shield</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        video { width: 100vw; height: 100vh; object-fit: cover; }
        
        #whiteout {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: white;
            display: none;
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        #close-btn {
            position: absolute;
            top: 20px; right: 20px;
            font-size: 30px; font-weight: bold;
            color: #444; cursor: pointer;
            border: 2px solid #444;
            width: 50px; height: 50px;
            display: flex; justify-content: center; align-items: center;
            border-radius: 50%;
        }

        #setup-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #111;
            color: white;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 2000;
        }

        button {
            padding: 20px 40px; font-size: 18px; cursor: pointer;
            background: #e74c3c; color: white; border: none; border-radius: 5px;
            font-weight: bold;
        }

        #debug {
            position: fixed; bottom: 10px; left: 10px; color: #00ff00; 
            font-family: monospace; font-size: 14px; background: rgba(0,0,0,0.5); padding: 5px;
        }

        canvas { display: none; }
    </style>
</head>
<body>

    <div id="setup-overlay">
        <button onclick="startApp()">START DISTANCE SHIELD</button>
        <p style="margin-top:15px; color:#888;">Sit in front of the cam first, then press start.</p>
    </div>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div id="debug">Motion: 0.0% | Status: Ready</div>

    <div id="whiteout">
        <div id="close-btn" onclick="resetShield()">X</div>
        <h1 style="color: #666; font-size: 50px;">PROTECTED</h1>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const whiteout = document.getElementById('whiteout');
        const setupOverlay = document.getElementById('setup-overlay');
        const debug = document.getElementById('debug');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        let frameBuffer = [];
        const BUFFER_SIZE = 10; 
        let isWhitedOut = false;

        async function startApp() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                setupOverlay.style.display = 'none';
                video.onloadedmetadata = () => {
                    video.play();
                    detectLoop();
                };
            } catch (err) {
                alert("Camera error.");
            }
        }

        function detectLoop() {
            if (isWhitedOut) return;

            canvas.width = 64;
            canvas.height = 48;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const currentFrame = ctx.getImageData(0, 0, canvas.width, canvas.height);

            if (frameBuffer.length >= BUFFER_SIZE) {
                const oldFrame = frameBuffer[0];
                let motionCount = 0;

                for (let i = 0; i < currentFrame.data.length; i += 4) {
                    const diff = Math.abs(currentFrame.data[i] - oldFrame.data[i]) +
                                 Math.abs(currentFrame.data[i+1] - oldFrame.data[i+1]) +
                                 Math.abs(currentFrame.data[i+2] - oldFrame.data[i+2]);
                    
                    if (diff > 100) motionCount++;
                }

                const motionPercent = (motionCount / (canvas.width * canvas.height));
                
                // Update Status Text
                let statusText = "Ignoring (Too Close)";
                if (motionPercent < 0.05 && motionPercent > 0.005) {
                    statusText = "TRIGGER ZONE";
                } else if (motionPercent <= 0.005) {
                    statusText = "Idle (No Far Motion)";
                }

                debug.innerText = `Motion: ${(motionPercent * 100).toFixed(1)}% | ${statusText}`;

                // --- THE CRITICAL FILTER ---
                // Trigger ONLY if motion is between 0.5% and 5%
                // If you move while close, you will likely hit 10%+, so it ignores you.
                if (motionPercent > 0.005 && motionPercent < 0.05) {
                    triggerWhiteout();
                }

                frameBuffer.shift();
            }

            frameBuffer.push(currentFrame);
            requestAnimationFrame(detectLoop);
        }

        function triggerWhiteout() {
            isWhitedOut = true;
            whiteout.style.display = 'flex';
        }

        function resetShield() {
            isWhitedOut = false;
            whiteout.style.display = 'none';
            frameBuffer = [];
            detectLoop();
        }
    </script>
</body>
</html>
