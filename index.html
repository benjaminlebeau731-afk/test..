<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distance Only Shield (Debug Mode)</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        video { width: 100vw; height: 100vh; object-fit: cover; }
        
        #whiteout {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: white; display: none; z-index: 1000;
            justify-content: center; align-items: center;
        }

        #close-btn {
            position: absolute; top: 20px; right: 20px;
            font-size: 30px; font-weight: bold; color: #444; cursor: pointer;
            border: 2px solid #444; width: 50px; height: 50px;
            display: flex; justify-content: center; align-items: center; border-radius: 50%;
        }

        #setup-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; color: white; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 2000;
        }

        button {
            padding: 20px 40px; font-size: 18px; cursor: pointer;
            background: #e74c3c; color: white; border: none; border-radius: 5px; font-weight: bold;
        }

        #debug {
            position: fixed; bottom: 10px; left: 10px; color: #00ff00; 
            font-family: monospace; font-size: 14px; background: rgba(0,0,0,0.5); padding: 5px; z-index: 500;
        }

        /* SHOW THE CANVAS FOR DEBUGGING */
        canvas { 
            display: block; 
            position: fixed; 
            bottom: 40px; 
            right: 10px; 
            width: 320px; 
            height: 240px; 
            z-index: 500; 
            border: 2px solid #00ff00; 
            background: black;
        }
    </style>
</head>
<body>

    <div id="setup-overlay">
        <button onclick="startApp()">START DISTANCE SHIELD</button>
        <p style="margin-top:15px; color:#888;">Sit in front of the cam first, then press start.</p>
    </div>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div id="debug">BG Motion: 0.0% | Status: Ready</div>

    <div id="whiteout">
        <div id="close-btn" onclick="resetShield()">X</div>
        <h1 style="color: #666; font-size: 50px;">PROTECTED</h1>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const whiteout = document.getElementById('whiteout');
        const setupOverlay = document.getElementById('setup-overlay');
        const debug = document.getElementById('debug');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        let frameBuffer = [];
        const BUFFER_SIZE = 10; 
        let isWhitedOut = false;
        let animationFrameId;

        async function startApp() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                setupOverlay.style.display = 'none';
                video.onloadedmetadata = () => {
                    video.play();
                    detectLoop();
                };
            } catch (err) {
                alert("Camera error.");
            }
        }

        function detectLoop() {
            if (isWhitedOut) return;

            canvas.width = 64;
            canvas.height = 48;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const currentFrame = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const drawFrame = ctx.createImageData(canvas.width, canvas.height); // For debug view

            if (frameBuffer.length >= BUFFER_SIZE) {
                const oldFrame = frameBuffer[0];
                let motionCount = 0;
                let validPixels = 0;

                for (let y = 0; y < canvas.height; y++) {
                    for (let x = 0; x < canvas.width; x++) {
                        
                        // --- WIDER SAFE ZONE FOR 1-2 FEET AWAY ---
                        // Ignored Area: Middle 70% horizontally, bottom 80% vertically.
                        const inSafeZone = (x > canvas.width * 0.15 && x < canvas.width * 0.85) && 
                                           (y > canvas.height * 0.20);

                        const i = (y * canvas.width + x) * 4;

                        // Copy camera pixels to our debug view
                        drawFrame.data[i] = currentFrame.data[i];     // R
                        drawFrame.data[i+1] = currentFrame.data[i+1]; // G
                        drawFrame.data[i+2] = currentFrame.data[i+2]; // B
                        drawFrame.data[i+3] = 255;                    // Alpha

                        if (inSafeZone) {
                            // Darken the safe zone in the debug view so you can see it
                            drawFrame.data[i] *= 0.2;
                            drawFrame.data[i+1] *= 0.2;
                            drawFrame.data[i+2] *= 0.2;
                        } else {
                            // Calculate motion only outside the safe zone
                            const diff = Math.abs(currentFrame.data[i] - oldFrame.data[i]) +
                                         Math.abs(currentFrame.data[i+1] - oldFrame.data[i+1]) +
                                         Math.abs(currentFrame.data[i+2] - oldFrame.data[i+2]);
                            
                            // Increased threshold from 100 to 150 to fight auto-exposure
                            if (diff > 150) {
                                motionCount++;
                                // Paint motion pixels BRIGHT RED in debug view
                                drawFrame.data[i] = 255;
                                drawFrame.data[i+1] = 0;
                                drawFrame.data[i+2] = 0;
                            }
                            validPixels++;
                        }
                    }
                }

                // Push visual debugger to the canvas
                ctx.putImageData(drawFrame, 0, 0);

                const motionPercent = (motionCount / validPixels);
                
                let statusText = "Idle";
                if (motionPercent > 0.02) {
                    statusText = "TRIGGER ZONE";
                }

                debug.innerText = `BG Motion: ${(motionPercent * 100).toFixed(1)}% | ${statusText}`;

                // Trigger if background motion > 2%
                if (motionPercent > 0.02) {
                    triggerWhiteout();
                    return;
                }

                frameBuffer.shift();
            }

            frameBuffer.push(currentFrame);
            animationFrameId = requestAnimationFrame(detectLoop);
        }

        function triggerWhiteout() {
            isWhitedOut = true;
            whiteout.style.display = 'flex';
            cancelAnimationFrame(animationFrameId);
        }

        function resetShield() {
            isWhitedOut = false;
            whiteout.style.display = 'none';
            frameBuffer = [];
            detectLoop();
        }
    </script>
</body>
</html>
